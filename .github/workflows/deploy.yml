name: Deploy Backend to Server

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Execute Remote SSH Commands
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ${{ secrets.QOSTRA_DIRECTORY_PATH }}

            git fetch https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git main
            git reset --hard FETCH_HEAD

            export PATH="$HOME/.local/bin:$PATH"
            export DJANGO_SETTINGS_MODULE=config.settings.prod

            uv sync --frozen

            uv run python manage.py migrate
            uv run python manage.py collectstatic --noinput

            sudo systemctl restart qostraDirectory
            sudo systemctl status qostraDirectory --no-pager
